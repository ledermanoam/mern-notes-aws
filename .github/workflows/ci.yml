name: CI/CD

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: notes
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Install backend dependencies
        working-directory: backend
        run: npm ci
      - name: Start the backend API
        working-directory: backend
        env:
          PORT: '4000'
          DATABASE_URL: postgres://postgres:postgres@localhost:5432/notes
          DATABASE_SSL: 'false'
          CORS_ORIGIN: http://localhost:5173
        run: npm run dev &
      - name: Wait for the API to be ready
        run: |
          for i in {1..30}; do
            if curl -s http://localhost:4000/api/health; then echo "up"; exit 0; fi
            sleep 2
          done
          exit 1
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install Python test dependencies
        run: pip install -r requirements.txt
      - name: Run the tests
        run: pytest

  deploy:
    needs: test
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: Build the frontend
        working-directory: frontend
        run: |
          echo "VITE_API_URL=https://63.184.245.145.sslip.io/api" > .env.production
          npm ci
          npm run build
      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: eu-central-1
      - name: Deploy to S3
        working-directory: frontend
        run: aws s3 sync dist/ s3://notes-frontend-lederman-2026 --delete
